# Include these directives inside the existing HTTPS `server { ... }` block
# for 10secslater.com. Keep the current certificate directives unchanged.

root /var/www/10secslater.com;
index index.html;

location = /editor {
    return 308 /editor/;
}

location / {
    try_files $uri $uri/ =404;
}

location ~* \.(?:css|js|mjs|woff2?|svg|ico)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location ~* \.html$ {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache";
}
