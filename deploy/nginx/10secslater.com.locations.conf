# Include these directives inside the existing HTTPS `server { ... }` block
# for 10secslater.com. Keep the current certificate directives unchanged.

root /var/www/10secslater.com;
index index.html;

location = /editor {
    return 308 /editor/;
}

# The protected `levels` branch writes public production level artifacts here.
# Keep this outside the static-site root: the website deployment uses rsync --delete.
location = /levels/manifest.json {
    alias /var/www/10secslater-levels/manifest.json;
    expires -1;
    add_header Cache-Control "no-store, max-age=0" always;
    add_header Access-Control-Allow-Origin "*" always;
}

location ~ "^/levels/(L[0-9]{2}\.v[0-9a-f]{8}\.json)$" {
    alias /var/www/10secslater-levels/$1;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
}

# The private Cocos repository publishes editor sprites independently. Keep
# these outside the website root so the main-site rsync --delete cannot remove them.
location = /sprites/manifest.json {
    alias /var/www/10secslater-sprites/manifest.json;
    expires -1;
    add_header Cache-Control "no-store, max-age=0" always;
    add_header Access-Control-Allow-Origin "*" always;
}

location ~ "^/sprites/([a-z0-9_]+\.[0-9a-f]{12}\.png)$" {
    alias /var/www/10secslater-sprites/$1;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
}

# Compatibility URLs used by the current Web editor. Revalidate on every visit;
# manifest-aware clients should prefer the immutable URL above.
location ~ "^/sprites/([a-z0-9_]+\.png)$" {
    alias /var/www/10secslater-sprites/$1;
    expires -1;
    add_header Cache-Control "no-cache" always;
    add_header Access-Control-Allow-Origin "*" always;
}

location / {
    try_files $uri $uri/ =404;
}

location ~* \.(?:css|js|mjs|woff2?|svg|ico)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location ~* \.html$ {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache";
}
