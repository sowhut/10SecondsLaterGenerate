name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_SPRITE_BASE_URL: ${{ vars.VITE_SPRITE_BASE_URL }}
          VITE_SANDBOX_URL: ${{ vars.VITE_SANDBOX_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Package static site
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: packages/editor/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Tencent Cloud
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      vars.DEPLOY_ENABLED == 'true'
    needs: check
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PATH: /var/www/10secslater.com
    steps:
      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: dist

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER}"
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing DEPLOY_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Publish static files
        shell: bash
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          ssh -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete --delay-updates \
            -e "ssh -p $port" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Verify production routes
        run: |
          curl --fail --silent --show-error --retry 5 --retry-all-errors https://10secslater.com/ \
            | grep -F '个人独立游戏实验'
          curl --fail --silent --show-error --retry 5 --retry-all-errors https://10secslater.com/editor/ \
            | grep -F '关卡编辑器'
