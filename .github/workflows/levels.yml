name: Production Levels

on:
  push:
    branches: [levels]
  pull_request:
    branches: [levels]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-levels
  cancel-in-progress: false

jobs:
  validate:
    name: Validate production levels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated public JSON Schema
        run: pnpm schema:check

      - name: Validate and package production levels
        run: pnpm levels:release

      - name: Upload immutable level release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: production-levels
          path: dist/levels
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy production levels
    if: >-
      github.ref == 'refs/heads/levels' &&
      github.event_name != 'pull_request' &&
      vars.DEPLOY_LEVELS_ENABLED == 'true'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PATH: /var/www/10secslater-levels
    steps:
      - name: Download production levels
        uses: actions/download-artifact@v4
        with:
          name: production-levels
          path: dist/levels

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER}"
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing DEPLOY_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload bodies, then atomically switch manifest
        shell: bash
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -p "$port" "$remote" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --exclude manifest.json --delay-updates \
            -e "ssh -p $port" \
            dist/levels/ "$remote:$DEPLOY_PATH/"
          scp -P "$port" dist/levels/manifest.json "$remote:$DEPLOY_PATH/manifest.json.next"
          ssh -p "$port" "$remote" \
            "mv '$DEPLOY_PATH/manifest.json.next' '$DEPLOY_PATH/manifest.json'"

      - name: Verify production manifest
        run: |
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            "https://www.10secslater.com/levels/manifest.json?t=${GITHUB_RUN_ID}" \
            | grep -F '"releaseId"'
